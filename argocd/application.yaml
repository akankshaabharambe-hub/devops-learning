apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-delivery-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-username/platform-delivery-demo.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
