name: CI - Platform Delivery Demo

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest

      - name: Run tests
        run: |
          python -m pytest tests/test_app.py

      - name: Validate Dockerfile exists
        run: |
          test -f Dockerfile
          echo "Dockerfile found"

      - name: Validate Kubernetes manifests exist
        run: |
          test -f k8s/deployment.yaml
          test -f k8s/service.yaml
          echo "Kubernetes manifests found"

      - name: Validate ArgoCD manifest exists
        run: |
          test -f argocd/application.yaml
          echo "ArgoCD manifest found"
