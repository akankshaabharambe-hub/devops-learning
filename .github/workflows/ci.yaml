name: CI - Platform Delivery Demo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest

      - name: Placeholder for SonarQube scan
        run: echo "SonarQube scan would run here using sonar-project.properties"

      - name: Build Docker image
        run: docker build -t platform-delivery-demo:${{ github.sha }} .

      - name: Placeholder for Harbor/Artifactory push
        run: echo "Docker image would be pushed to Harbor or Artifactory here"
